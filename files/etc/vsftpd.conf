# ===== vsftpd on RevPi (Debian Bookworm) =====
# WAN/customer network: eth1 = DHCP
# LAN/internal:         eth0 = 192.168.19.219

listen=YES
listen_ipv6=NO

anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022

# Keep local users in jail
chroot_local_user=YES
allow_writeable_chroot=YES

# No access or restriction lists
userlist_enable=NO
userlist_deny=NO
userlist_file=/etc/vsftpd.allowed_users
# Optional: Block certain system users by default
# (Add system users as needed)
# deny_file=/etc/vsftpd.denied_users

# Passive Mode (must be compatible with nftables)
pasv_enable=YES
pasv_min_port=50000
pasv_max_port=50100

# Important for Multi-NIC/NAT: The IP address the client should see
pasv_addr_resolve=NO
# pasv_address=192.168.178.219  #  <- use only if RevPi eth1 address is static

# Stability/Timeouts
use_localtime=YES
idle_session_timeout=600
data_connection_timeout=120
accept_timeout=60
connect_timeout=60

# Logging
xferlog_enable=YES
xferlog_std_format=NO
log_ftp_protocol=YES
vsftpd_log_file=/var/log/vsftpd.log

# Hardening/Noise
max_login_fails=3
delay_failed_login=3
hide_ids=YES

# Optional: Listen ONLY on the WAN (recommended if you don't need FTP on the LAN)
# listen_address=192.168.178.219
